<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JQuery</title>
    <!-- ----------------- Jqury cdn------------- -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        
    </style>
</head>
<body>
    <button id="magic-btn">Click me!</button>
    <p id="text">See me change and hide when you clicked</p>

    <script>

        $(document).ready(function(){

            $('#magic-btn').click(function(){
                $("#text").fadeToggle("slow")
            })

        })




    </script>

</body>
</html>
